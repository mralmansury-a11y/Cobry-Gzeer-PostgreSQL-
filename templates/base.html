<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ملاعبي{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: #141b2d;
    --card2: #1e2d45;
    --border: #1e3a5f33;
    --primary: #00d4aa;
    --primary-dim: #00d4aa22;
    --secondary: #3b82f6;
    --accent: #f59e0b;
    --danger: #ef4444;
    --success: #10b981;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #4a5568;
    --glow: 0 0 30px #00d4aa33;
    --r: 14px;
    --r-sm: 8px;
    --shadow: 0 8px 32px #0008;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

  /* LAYOUT */
  .app-layout { display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    z-index: 100;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: var(--glow);
  }
  .logo-text { font-size: 18px; font-weight: 900; color: var(--primary); }
  .logo-sub { font-size: 11px; color: var(--text-dim); }

  .sidebar-user {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: white;
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--primary); }

  .sidebar-nav { padding: 12px 0; flex: 1; }
  .nav-section { padding: 8px 20px 4px; font-size: 10px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px; cursor: pointer;
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
    transition: all .2s;
    border-right: 3px solid transparent;
    margin: 1px 0;
  }
  .nav-item:hover { background: var(--primary-dim); color: var(--text); }
  .nav-item.active {
    background: var(--primary-dim);
    color: var(--primary);
    border-right-color: var(--primary);
  }
  .nav-item i { width: 18px; text-align: center; font-size: 14px; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .logout-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--r-sm);
    background: #ef444420; color: var(--danger);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all .2s; border: none; width: 100%; font-family: inherit;
    text-decoration: none;
  }
  .logout-btn:hover { background: #ef444440; }

  /* MAIN */
  .main-content {
    flex: 1;
    margin-right: 260px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(10px);
  }
  .page-title { font-size: 18px; font-weight: 800; }
  .page-subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .content-area { padding: 28px; flex: 1; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .card-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .card-title i { color: var(--primary); }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
    display: flex; align-items: center; gap: 16px;
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .stat-icon {
    width: 50px; height: 50px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .stat-icon.green { background: #10b98122; color: var(--success); }
  .stat-icon.blue { background: #3b82f622; color: var(--secondary); }
  .stat-icon.amber { background: #f59e0b22; color: var(--accent); }
  .stat-icon.cyan { background: #00d4aa22; color: var(--primary); }
  .stat-value { font-size: 28px; font-weight: 900; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* STADIUM CARDS */
  .stadium-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    transition: all .3s;
    cursor: pointer;
  }
  .stadium-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px #00d4aa1a; border-color: #00d4aa44; }
  .stadium-thumb {
    height: 120px;
    background: linear-gradient(135deg, var(--bg3), var(--card2));
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    position: relative;
  }
  .stadium-status {
    position: absolute; top: 10px; left: 10px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .status-available { background: #10b98122; color: var(--success); border: 1px solid #10b98133; }
  .status-unavailable { background: #ef444422; color: var(--danger); border: 1px solid #ef444433; }
  .stadium-info { padding: 14px; }
  .stadium-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .stadium-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .stadium-tag {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-dim);
  }
  .stadium-tag i { color: var(--primary); font-size: 10px; }
  .stadium-price { font-size: 16px; font-weight: 900; color: var(--primary); }
  .stadium-price span { font-size: 11px; color: var(--text-dim); font-weight: 400; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    text-align: right; padding: 12px 14px;
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .5px;
    white-space: nowrap;
  }
  td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: var(--primary-dim); }
  tbody tr:last-child td { border-bottom: none; }

  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-green { background: #10b98122; color: var(--success); }
  .badge-red { background: #ef444422; color: var(--danger); }
  .badge-blue { background: #3b82f622; color: var(--secondary); }
  .badge-amber { background: #f59e0b22; color: var(--accent); }
  .badge-cyan { background: #00d4aa22; color: var(--primary); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: var(--r-sm);
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: none; font-family: inherit; transition: all .2s;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #00b894);
    color: #0a0e1a;
    box-shadow: 0 4px 15px #00d4aa33;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px #00d4aa55; }
  .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg3); }
  .btn-danger { background: #ef444422; color: var(--danger); border: 1px solid #ef444433; }
  .btn-danger:hover { background: #ef444433; }
  .btn-success { background: #10b98122; color: var(--success); border: 1px solid #10b98133; }
  .btn-success:hover { background: #10b98133; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { width: 34px; height: 34px; padding: 0; justify-content: center; }

  /* FORMS */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dim);
    margin-bottom: 6px; }
  .form-control {
    width: 100%; padding: 11px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--text);
    font-size: 13px; font-family: 'Cairo', sans-serif;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px #00d4aa22; }
  .form-control::placeholder { color: var(--text-muted); }
  select.form-control option { background: var(--bg2); }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; background: #000a;
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    padding: 28px;
    transform: scale(.95) translateY(10px);
    transition: transform .25s;
    box-shadow: 0 20px 60px #000a;
  }
  .modal-backdrop.open .modal { transform: scale(1) translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .modal-title { font-size: 18px; font-weight: 800; }
  .modal-close {
    background: var(--bg3); border: none; color: var(--text-dim);
    width: 32px; height: 32px; border-radius: var(--r-sm);
    cursor: pointer; font-size: 16px; display: flex;
    align-items: center; justify-content: center;
    transition: all .2s;
  }
  .modal-close:hover { background: var(--danger); color: white; }

  /* TOAST */
  #toast-container {
    position: fixed; bottom: 24px; left: 24px;
    z-index: 9999; display: flex; flex-direction: column; gap: 10px;
  }
  .toast {
    padding: 14px 18px; border-radius: var(--r-sm);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
    min-width: 280px; max-width: 380px;
    animation: slideIn .3s ease;
    box-shadow: var(--shadow);
  }
  .toast-success { background: #10b981; color: white; }
  .toast-error { background: var(--danger); color: white; }
  .toast-info { background: var(--secondary); color: white; }
  @keyframes slideIn { from { transform: translateX(-20px); opacity:0; } to { transform: none; opacity:1; } }
  @keyframes fadeOut { to { opacity:0; transform: translateX(-20px); } }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state i { font-size: 52px; margin-bottom: 16px; color: var(--text-muted); }
  .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg3);
    padding: 4px; border-radius: var(--r-sm); }
  .tab {
    flex: 1; padding: 9px; text-align: center; cursor: pointer;
    font-size: 13px; font-weight: 600; border-radius: var(--r-sm);
    color: var(--text-dim); transition: all .2s;
  }
  .tab.active { background: var(--primary); color: #0a0e1a; }

  /* HOURS GRID */
  .hours-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .hour-btn {
    padding: 10px 6px; text-align: center; border-radius: var(--r-sm);
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text); transition: all .2s;
  }
  .hour-btn:hover:not(.booked) { border-color: var(--primary); color: var(--primary); }
  .hour-btn.selected { background: var(--primary); color: #0a0e1a; border-color: var(--primary); }
  .hour-btn.booked { background: #ef444411; color: var(--danger); border-color: #ef444433; cursor: not-allowed; }

  /* SCROLLABLE PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 40px; color: var(--text-dim); font-size: 14px; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION DIVIDER */
  .section-title {
    font-size: 20px; font-weight: 900; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* GLOWING ACCENT LINE */
  .accent-line {
    height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary), transparent);
    border-radius: 2px; margin-bottom: 24px;
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main-content { margin-right: 0; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>
<div id="toast-container"></div>

{% block body %}{% endblock %}

<script>
function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-times-circle' : 'fa-info-circle';
  t.innerHTML = `<i class="fa fa-${icon}"></i> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation='fadeOut .3s ease forwards'; setTimeout(()=>t.remove(), 300); }, 3500);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showTab(name, allClass, activeClass) {
  document.querySelectorAll(`.${allClass}`).forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`.tab`).forEach(t => t.classList.remove('active'));
  document.getElementById(name)?.classList.add('active');
  document.querySelector(`[data-tab="${name}"]`)?.classList.add('active');
}

async function api(url, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

async function del(url) {
  const r = await fetch(url, { method: 'DELETE' });
  return r.json();
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
